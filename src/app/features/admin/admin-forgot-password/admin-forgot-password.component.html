<div class="login-container">
  <mat-card class="login-card">
    <mat-card-content>
      <h1 class="card-title">{{ 'admin.forgotPassword.title' | translate }}</h1>
      @if (submitted()) {
        <p class="success-message">{{ 'admin.forgotPassword.successMessage' | translate }}</p>
        <div class="actions">
          <a mat-button routerLink="/admin/login">{{ 'admin.forgotPassword.backToLogin' | translate }}</a>
        </div>
      } @else {
        <form [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'admin.login.email' | translate }}</mat-label>
            <input matInput formControlName="email" type="email" autocomplete="email">
          </mat-form-field>
          @if (error()) {
            <div class="error-message">{{ 'admin.forgotPassword.error' | translate }}</div>
          }
          <div class="actions">
            <button mat-stroked-button type="button" routerLink="/admin/login">
              {{ 'admin.forgotPassword.backToLogin' | translate }}
            </button>
            <button mat-raised-button color="primary" type="submit" class="action-btn"
                    [disabled]="form.invalid || isLoading()">
              {{ isLoading() ? ('admin.forgotPassword.submitting' | translate) : ('admin.forgotPassword.submit' | translate) }}
            </button>
          </div>
        </form>
      }
    </mat-card-content>
  </mat-card>
</div>
