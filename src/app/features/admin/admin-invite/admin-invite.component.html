<div class="login-container">
  <mat-card class="login-card">
    <mat-card-content>
      @if (unauthorized()) {
        <p class="error-message">Accès non autorisé.</p>
      } @else if (submitted()) {
        <p class="success-message">{{ 'admin.invite.successMessage' | translate }}</p>
      } @else {
        <h1 class="card-title">{{ 'admin.invite.title' | translate }}</h1>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'admin.invite.email' | translate }}</mat-label>
            <input matInput formControlName="email" type="email" autocomplete="email">
          </mat-form-field>
          <div class="actions">
            <a mat-button routerLink="/admin/login">{{ 'admin.invite.backToLogin' | translate }}</a>
            <button mat-raised-button color="primary" type="submit" class="action-btn"
                    [disabled]="form.invalid || isLoading()">
              {{ isLoading() ? ('admin.invite.submitting' | translate) : ('admin.invite.submit' | translate) }}
            </button>
          </div>
        </form>
      }
    </mat-card-content>
  </mat-card>
</div>
