<div class="login-container">
  <mat-card class="login-card">
    <mat-card-content>
      <h1 class="card-title">{{ 'admin.login.title' | translate }}</h1>
      <form [formGroup]="loginForm" (ngSubmit)="login()">
        @if (loginMode() === 'email') {
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'admin.login.email' | translate }}</mat-label>
            <input matInput formControlName="email" type="email" autocomplete="email">
          </mat-form-field>
        }
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'admin.login.passwordLabel' | translate }}</mat-label>
          <input matInput [type]="showPassword() ? 'text' : 'password'" formControlName="password">
          <mat-icon matSuffix class="toggle-password" (click)="togglePassword()">
            {{ showPassword() ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </mat-form-field>

        @if (loginError()) {
          <div class="error-message">{{ 'admin.login.wrongPassword' | translate }}</div>
        }

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" class="action-btn"
                  [disabled]="loginForm.invalid || isLoading()">
            {{ isLoading() ? ('admin.login.submitting' | translate) : ('admin.login.submit' | translate) }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
